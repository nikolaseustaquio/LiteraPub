<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Painel do Escritor - LiteraPub</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="CSS/escritor.css">
    <link rel="stylesheet" href="CSS/acessibilidade.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="barra-acessibilidade">
        <button id="btnAumentar" title="Aumentar fonte"><i class="bi bi-zoom-in"></i></button>
        <button id="btnDiminuir" title="Diminuir fonte"><i class="bi bi-zoom-out"></i></button>
        <button id="btnLer" title="Ler página"><i class="bi bi-earbuds"></i></button>
    </div>

    <div class="pagina">

        <aside class="sidebar">
            <div class="logo-sidebar">
                <i class="bi bi-book"></i>
                <h1 class="logo-nome">LiteraPub</h1>
                <p class="logo-frase">Gerencie seus livros aqui!</p>
            </div>

            <div class="menu-box">
                <a href="catalogo.html" class="botao-voltar">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>
        </aside>

        <main class="conteudo">
            <div class="secao-stats">
                <div class="stat-card">
                    <i class="bi bi-book-fill"></i>
                    <div class="stat-info">
                        <p class="stat-label">Livros Publicados</p>
                        <p class="stat-valor" id="totalLivros">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <i class="bi bi-eye-fill"></i>
                    <div class="stat-info">
                        <p class="stat-label">Visualizações Total</p>
                        <p class="stat-valor" id="totalVisualizacoes">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <i class="bi bi-star-fill"></i>
                    <div class="stat-info">
                        <p class="stat-label">Nota Média Geral</p>
                        <p class="stat-valor" id="notaMediaGeral">0.0</p>
                    </div>
                </div>
            </div>

            <div class="topo-tabela">
                <h2>Meus Livros</h2>
                <button class="botao-publicar" id="btnPublicar">
                    <i class="bi bi-plus-circle"></i> Publicar Livro
                </button>
            </div>

            <div class="tabela-container">
                <table class="tabela-livros">
                    <thead>
                        <tr>
                            <th>Livro</th>
                            <th>Autor</th>
                            <th>Status</th>
                            <th>Páginas</th>
                            <th>Visualizações</th>
                            <th>Nota Média</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaLivros">
 
                    </tbody>
                </table>
                <div id="mensagemVazio" class="mensagem-vazio" style="display: none;">
                    <i class="bi bi-book"></i>
                    <p>Nenhum livro publicado ainda. Comece a criar!</p>
                </div>
            </div>

        </main>

    </div>


    <div id="modalPublicar" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Publicar Novo Livro</h3>
                <button class="botao-fechar" id="btnFecharModal">
                    <i class="bi bi-x"></i>
                </button>
            </div>

            <form id="formPublicar">
                <div class="campo-form">
                    <label>Capa do Livro</label>
                    <input type="file" id="capaLivro" accept="image/*" class="campo-input">
                </div>

                <div class="campo-form">
                    <label>Nome do Livro</label>
                    <input type="text" id="nomeLivro" placeholder="Digite o título" class="campo-input" required>
                </div>

                <div class="campo-form">
                    <label>Autor</label>
                    <input type="text" id="autorLivro" placeholder="Seu nome" class="campo-input" required>
                </div>

                <div class="campo-form">
                    <label>Quantidade de Páginas</label>
                    <input type="number" id="paginasLivro" placeholder="Ex: 320" class="campo-input" required>
                </div>

                <div class="campo-form">
                    <label>Descrição/Sinopse</label>
                    <textarea id="sinopseLivro" placeholder="Descreva seu livro..." class="campo-input" rows="4"></textarea>
                </div>

                <div class="campo-form">
                    <label>Importar Páginas</label>
                    <input type="file" id="arquivoLivro" accept=".txt,.pdf,.docx" class="campo-input">
                    <p class="campo-info">Formatos aceitos: TXT, PDF, DOCX</p>
                </div>

                <div class="modal-footer">
                    <button type="button" class="botao-cancelar" id="btnCancelar">Cancelar</button>
                    <button type="submit" class="botao-confirmar">Publicar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="JS/acessibilidade.js"></script>
    <script src="JS/escritor.js"></script>
</body>
</html>
